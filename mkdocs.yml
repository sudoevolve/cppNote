site_name: QtCraft 开发文档
# site_url: https://sudoevolve.github.io/cppNote/
site_description: Qt/C++/QML 开发文档与组件库

# 文档根目录设为 docs 目录
docs_dir: docs

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true

extra_javascript:
  - assets/javascripts/online-compile.js
  - assets/javascripts/theme-palette.js

extra_css:
  - assets/stylesheets/online-compile.css
  - assets/stylesheets/theme-palette.css

